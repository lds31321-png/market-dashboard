<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>로그인 — 직트 종합 옵션 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f7f3ed;color:#2b2424;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#fff;border-radius:18px;padding:48px 40px;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,.08);border:1px solid rgba(217,102,74,.10)}
  .logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:8px}
  .logo-mark{width:48px;height:48px;background:linear-gradient(135deg,#d9664a 0%,#c25538 100%);border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:18px;letter-spacing:.5px}
  .logo-title{font-size:20px;font-weight:900;color:#2b2424;letter-spacing:-.02em}
  h1{font-size:24px;font-weight:900;color:#2b2424;text-align:center;margin-top:24px;letter-spacing:-.02em}
  .sub{font-size:14px;color:#7a7368;text-align:center;margin-top:8px;margin-bottom:32px;line-height:1.7}
  .btn-social{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:12px;border:none;font-size:15px;font-weight:800;cursor:pointer;transition:all .15s;font-family:inherit;margin-bottom:12px;text-decoration:none}
  .btn-kakao{background:#FEE500;color:#371D1E}
  .btn-kakao:hover{background:#fed800;transform:translateY(-1px);box-shadow:0 4px 12px rgba(254,229,0,.4)}
  .btn-google{background:#fff;color:#3c4043;border:1.5px solid #dadce0}
  .btn-google:hover{background:#f8f9fa;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.08)}
  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:#a89e95;font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.10)}
  .notice{background:rgba(217,102,74,.06);border-left:3px solid #d9664a;padding:14px 16px;border-radius:8px;margin-top:24px;font-size:12px;color:#5a544f;line-height:1.7}
  .notice b{color:#d9664a}
  .footer{margin-top:32px;text-align:center;font-size:11px;color:#a89e95;line-height:1.8}
  .footer a{color:#d9664a;text-decoration:none;font-weight:700}
  .footer a:hover{text-decoration:underline}
  .err{display:none;background:#ffefef;border-left:3px solid #c83030;padding:12px 14px;border-radius:6px;margin-bottom:18px;font-size:13px;color:#c83030;font-weight:700}
  .err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">CL</div>
    <div class="logo-title">직트 옵션 대시보드</div>
  </div>

  <h1>로그인</h1>
  <p class="sub">카카오 또는 구글 계정으로<br>1초 만에 시작하세요.</p>

  <div id="err-box" class="err"></div>

  <a id="btn-kakao" class="btn-social btn-kakao" href="#">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3C6.48 3 2 6.59 2 11c0 2.95 1.97 5.51 4.92 6.92-.21.74-.79 2.78-.91 3.22-.14.55.2.55.42.4.17-.12 2.7-1.83 3.79-2.57.58.08 1.18.13 1.78.13 5.52 0 10-3.59 10-8s-4.48-8-10-8z" fill="#371D1E"/>
    </svg>
    카카오로 시작하기
  </a>

  <a id="btn-google" class="btn-social btn-google" href="#">
    <svg width="20" height="20" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    구글로 시작하기
  </a>

  <div class="notice">
    <b>안내</b> · 처음 로그인하시면 <b>1주일 무료 체험</b>이 자동으로 시작됩니다. 기간 안에 결제하지 않으셔도 데이터 입력·매매 현황·매매 복기 탭은 계속 무료로 사용 가능합니다.<br>
    한 계정당 한 기기에서만 사용 가능합니다.
  </div>

  <div class="footer">
    © 2026 직트 · 사업자 782-08-02561 · 대표 임대성<br>
    <a href="./terms.html" target="_blank">이용약관</a> · <a href="./refund.html" target="_blank">환불정책</a> · <a href="./privacy.html" target="_blank">개인정보처리방침</a><br>
    문의 <a href="https://open.kakao.com/o/sWnslm0d" target="_blank">카카오 오픈채팅</a>
  </div>
</div>

<script>
/* 백엔드 API URL — 직트가 Cloudflare 가입 + Workers 배포 후 실제 URL로 교체
   기본값 placeholder. 배포 시 자동 갱신 */
window.JIKT_API = 'https://jikt-dashboard-api.workers.dev';   /* TODO: 실제 URL로 */

(function(){
  /* URL 파라미터에 에러가 있으면 표시 */
  var url = new URL(location.href);
  var error = url.searchParams.get('error');
  if (error) {
    var msgs = {
      'no_code': '로그인 취소됨',
      'token_failed': '인증 실패. 다시 시도해 주세요.',
      'user_info_failed': '회원 정보 가져오기 실패',
      'kakao_access_denied': '카카오 동의가 취소됨',
      'google_access_denied': '구글 동의가 취소됨'
    };
    var box = document.getElementById('err-box');
    box.textContent = msgs[error] || ('오류: ' + error);
    box.classList.add('show');
  }

  /* 카카오 로그인 버튼 */
  document.getElementById('btn-kakao').addEventListener('click', function(e){
    e.preventDefault();
    location.href = window.JIKT_API + '/auth/kakao/login';
  });

  /* 구글 로그인 버튼 */
  document.getElementById('btn-google').addEventListener('click', function(e){
    e.preventDefault();
    location.href = window.JIKT_API + '/auth/google/login';
  });
})();
</script>
</body>
</html>
