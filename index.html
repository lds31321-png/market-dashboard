<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>글로벌 시장 대시보드 — 점검 중</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Noto Sans KR',-apple-system,sans-serif;
    background:#0e1117; color:#e6e9ef;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; padding:28px; text-align:center;
    background-image:radial-gradient(circle at 50% 30%, rgba(69,147,252,.10), transparent 60%);
  }
  .box{ width:100%; max-width:440px; }
  .ic{ font-size:52px; line-height:1; margin-bottom:22px; }
  h1{ font-size:23px; font-weight:800; letter-spacing:-.01em; margin-bottom:16px; color:#f5f6f8; }
  p{ font-size:15.5px; line-height:1.9; color:#aab3c0; }
  p b{ color:#cfd6e0; font-weight:700; }
  .divider{ width:44px; height:3px; border-radius:3px; background:#4593FC; margin:22px auto; opacity:.85; }
  .home{
    display:inline-flex; align-items:center; justify-content:center;
    height:46px; padding:0 24px; margin-top:30px;
    border-radius:11px; border:1px solid rgba(255,255,255,.16);
    background:rgba(255,255,255,.03);
    color:#cfd6e0; font-size:14.5px; font-weight:700; text-decoration:none;
    transition:all .15s;
  }
  .home:hover{ border-color:#4593FC; color:#fff; background:rgba(69,147,252,.12); }
  .sub{ margin-top:24px; font-size:12.5px; color:#6b7480; }
  @media(max-width:480px){
    .ic{ font-size:46px; } h1{ font-size:20px; } p{ font-size:15px; }
  }
</style>
</head>
<body>
  <div class="box">
    <div class="ic">🔧</div>
    <h1>글로벌 시장 대시보드<br>점검 중입니다</h1>
    <div class="divider"></div>
    <p>
      현재 <b>일부 기능을 수정하고 있어</b><br>
      잠시 이용이 어렵습니다.<br>
      빠르게 정비 후 다시 찾아뵙겠습니다.<br>
      양해 부탁드립니다. 🙏
    </p>
    <a class="home" href="hub.html">← 메인으로</a>
    <div class="sub">© 2026 직트</div>
  </div>
</body>
</html>
