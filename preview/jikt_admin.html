<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>직트 관리자 — 옵션 대시보드</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito','Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f7f3ed;color:#2b2424;min-height:100vh;padding:32px 24px;line-height:1.6}
  .wrap{max-width:1280px;margin:0 auto}
  .hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:20px;border-bottom:2px solid rgba(217,102,74,.18)}
  .hdr h1{font-size:24px;font-weight:900;color:#d9664a;letter-spacing:-.02em}
  .hdr .who{font-size:13px;color:#7a7368}
  .tabs{display:flex;gap:8px;margin-bottom:24px;border-bottom:1px solid rgba(0,0,0,.10);flex-wrap:wrap}
  .tab{padding:10px 18px;border:none;background:transparent;cursor:pointer;font-size:14px;font-weight:700;color:#7a7368;border-bottom:3px solid transparent;font-family:inherit;transition:all .15s}
  .tab.active{color:#d9664a;border-bottom-color:#d9664a}
  .tab:hover{color:#d9664a}
  .panel{display:none;background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.04);border:1px solid rgba(217,102,74,.08)}
  .panel.active{display:block}
  .panel h2{font-size:16px;font-weight:800;color:#2b2424;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
  .panel h2 .meta{font-size:12px;font-weight:600;color:#7a7368}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{border-bottom:1px solid rgba(0,0,0,.06);padding:12px 10px;text-align:left;vertical-align:middle}
  th{background:rgba(217,102,74,.05);font-weight:800;color:#d9664a;font-size:12px;text-transform:uppercase;letter-spacing:.5px}
  tr:hover{background:rgba(217,102,74,.03)}
  .badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:11px;font-weight:800;letter-spacing:.3px}
  .badge-paid{background:rgba(26,122,74,.12);color:#1a7a4a}
  .badge-trial{background:rgba(254,229,0,.20);color:#9a7d00}
  .badge-free{background:rgba(0,0,0,.06);color:#7a7368}
  .badge-suspended{background:rgba(200,48,48,.10);color:#c83030}
  .btn{padding:6px 12px;border-radius:6px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:4px}
  .btn-primary{background:#d9664a;color:#fff}
  .btn-ghost{background:rgba(217,102,74,.10);color:#d9664a;border:1px solid rgba(217,102,74,.30)}
  .btn-danger{background:rgba(200,48,48,.10);color:#c83030;border:1px solid rgba(200,48,48,.30)}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
  .stat{background:#fff;border-radius:10px;padding:18px 20px;border:1px solid rgba(217,102,74,.10)}
  .stat-label{font-size:12px;color:#7a7368;margin-bottom:4px;font-weight:700}
  .stat-value{font-size:24px;font-weight:900;color:#d9664a;letter-spacing:-.02em}
  .stat-sub{font-size:11px;color:#a89e95;margin-top:2px}
  .empty{padding:40px;text-align:center;color:#a89e95;font-size:13px}
  input,select{padding:8px 12px;border-radius:6px;border:1.5px solid rgba(217,102,74,.20);font-size:13px;font-family:inherit;outline:none}
  input:focus,select:focus{border-color:#d9664a}
  .login-required{max-width:480px;margin:80px auto;background:#fff;border-radius:14px;padding:40px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.08)}
  .login-required h1{font-size:22px;color:#d9664a;font-weight:900;margin-bottom:12px}
  .login-required p{font-size:14px;color:#7a7368;margin-bottom:20px}
</style>
</head>
<body>
<div id="app-root">
  <div class="login-required" id="login-required">
    <h1>관리자 로그인 필요</h1>
    <p>직트 본인 계정으로만 접속 가능합니다.</p>
    <a class="btn btn-primary" href="./login.html?from=admin" style="text-decoration:none;display:inline-block;padding:12px 24px;font-size:14px">로그인하기</a>
  </div>

  <div class="wrap" id="admin-wrap" style="display:none">
    <div class="hdr">
      <h1>직트 관리자 · 옵션 대시보드</h1>
      <div class="who" id="who"></div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-label">총 회원</div><div class="stat-value" id="st-users">-</div></div>
      <div class="stat"><div class="stat-label">이번 달 결제</div><div class="stat-value" id="st-pay-count">-</div><div class="stat-sub" id="st-pay-sub"></div></div>
      <div class="stat"><div class="stat-label">이번 달 매출</div><div class="stat-value" id="st-revenue">-</div><div class="stat-sub" id="st-revenue-sub"></div></div>
      <div class="stat"><div class="stat-label">재등록 요청</div><div class="stat-value" id="st-reset">-</div></div>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="users">회원</button>
      <button class="tab" data-tab="payments">결제</button>
      <button class="tab" data-tab="devices">디바이스 요청</button>
      <button class="tab" data-tab="revenue">매출 집계</button>
    </div>

    <div class="panel active" id="panel-users">
      <h2>회원 목록 <span class="meta" id="users-meta"></span></h2>
      <div id="users-table" class="empty">로딩 중...</div>
    </div>

    <div class="panel" id="panel-payments">
      <h2>결제 내역
        <span><input type="month" id="payments-month" style="font-size:12px"></span>
      </h2>
      <div id="payments-table" class="empty">월 선택 후 조회</div>
    </div>

    <div class="panel" id="panel-devices">
      <h2>디바이스 재등록 요청</h2>
      <div id="devices-table" class="empty">로딩 중...</div>
    </div>

    <div class="panel" id="panel-revenue">
      <h2>월 매출 집계
        <span><input type="month" id="revenue-month" style="font-size:12px"></span>
      </h2>
      <div id="revenue-content" class="empty">월 선택 후 조회</div>
    </div>

    <!-- ═══ 주간 추천 포지션 ═══ -->
    <div class="panel" id="panel-weekly-picks" style="grid-column:1/-1">
      <h2>📌 주간 추천 포지션 입력</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:12px">
        아래 형식으로 한 줄에 포지션 하나씩 입력하세요.<br>
        <code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:12px">날짜, 종목, 월물, 행사가 X, 콜/풋옵션 매도, 프리미엄, N계약 추천 증거금 Y</code>
      </p>
      <div style="margin-bottom:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <input type="text" id="picks-title" placeholder="제목 (예: 06월 02일 추천 포지션)" style="flex:1;min-width:200px;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px">
        <button onclick="saveWeeklyPicks()" style="padding:8px 20px;background:#d9664a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">저장</button>
        <button onclick="clearWeeklyPicks()" style="padding:8px 16px;background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;border-radius:8px;font-size:13px;cursor:pointer">초기화</button>
      </div>
      <textarea id="picks-input" rows="10" placeholder="06월 02일, 크루드 오일, 08월물, 행사가 177.5, 콜옵션 매도, 0.17, 1계약 추천&#10;06월 02일, 크루드 오일, 08월물, 행사가 60, 풋옵션 매도, 0.15, 1계약 추천 증거금 942&#10;06월 02일, 천연가스, 08월물, 행사가 4.65, 콜옵션 매도, 0.016, 1계약 추천 증거금 485" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;box-sizing:border-box"></textarea>
      <div id="picks-status" style="margin-top:8px;font-size:13px;color:#6b7280"></div>
      <div id="picks-preview" style="margin-top:14px"></div>
    </div>

  </div>
</div>

<script>
/* 백엔드 API URL — 직트가 Cloudflare 배포 후 실제 URL로 교체 */
window.JIKT_API = 'https://jikt-dashboard-api.eotjd3133.workers.dev';   /* TODO */

(function(){
  var token = (function(){
    var hash = location.hash;
    if (hash.indexOf('#token=') === 0) {
      var t = decodeURIComponent(hash.split('=')[1].split('&')[0]);
      localStorage.setItem('jikt_token', t);
      history.replaceState(null, '', location.pathname);
      return t;
    }
    var t = localStorage.getItem('jikt_token');
    if (!t) {
      try {
        var auth = JSON.parse(localStorage.getItem('jikt_auth') || 'null');
        if (auth && auth.token) t = auth.token;
      } catch(e){}
    }
    return t;
  })();

  if (!token) {
    document.getElementById('login-required').style.display = 'block';
    return;
  }

  api('GET', '/auth/me', null, token).then(function(res){
    if (!res || !res.ok || !res.user) {
      document.getElementById('login-required').style.display = 'block';
      return;
    }
    document.getElementById('login-required').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    document.getElementById('who').textContent = res.user.email + ' (' + res.user.name + ')';
    initApp();
  }).catch(function(){
    document.getElementById('login-required').style.display = 'block';
  });

  function api(method, path, body, t) {
    return fetch(window.JIKT_API + path, {
      method: method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (t || token)
      },
      body: body ? JSON.stringify(body) : null
    }).then(function(r){ return r.json(); });
  }

  function initApp() {
    loadStats();

    document.querySelectorAll('.tab').forEach(function(tab){
      tab.addEventListener('click', function(){
        document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
        document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'users') loadUsers();
        if (tab.dataset.tab === 'devices') loadDevices();
      });
    });

    loadUsers();
    loadDevices();

    var now = new Date();
    var ym = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('payments-month').value = ym;
    document.getElementById('revenue-month').value = ym;
    document.getElementById('payments-month').addEventListener('change', loadPayments);
    document.getElementById('revenue-month').addEventListener('change', loadRevenue);
    loadPayments();
    loadRevenue();
  }

  function loadStats() {
    Promise.all([
      api('GET', '/admin/users?page=1&pageSize=1'),
      api('GET', '/admin/revenue'),
      api('GET', '/admin/device/requests')
    ]).then(function(arr){
      document.getElementById('st-users').textContent = arr[0].total || 0;
      var rev = arr[1] || {};
      document.getElementById('st-pay-count').textContent = (rev.count || 0) + '건';
      document.getElementById('st-pay-sub').textContent = rev.month || '';
      document.getElementById('st-revenue').textContent = ((rev.net || 0)/10000).toFixed(0) + '만원';
      document.getElementById('st-revenue-sub').textContent = '환불 ' + ((rev.refund || 0)/10000).toFixed(0) + '만원';
      document.getElementById('st-reset').textContent = (arr[2].requests || []).length;
    });
  }

  function loadUsers() {
    var box = document.getElementById('users-table');
    box.innerHTML = '로딩 중...';
    api('GET', '/admin/users?page=1&pageSize=50').then(function(res){
      if (!res.ok) return box.innerHTML = '<div class="empty">불러오기 실패</div>';
      if (res.users.length === 0) return box.innerHTML = '<div class="empty">회원 없음</div>';
      document.getElementById('users-meta').textContent = '전체 ' + res.total + '명';
      var rows = res.users.map(function(u){
        return '<tr><td>' + esc(u.email) + '</td><td>' + esc(u.name) + '</td>'
          + '<td>' + u.provider + '</td>'
          + '<td>' + planBadge(u) + '</td>'
          + '<td>' + shortDate(u.paidUntil) + '</td>'
          + '<td>' + shortDate(u.createdAt) + '</td>'
          + '<td>'
          + (u.status==='active' ? '<button class="btn btn-danger" onclick="adminSuspend(\''+u.userId+'\')">정지</button>' : '<button class="btn btn-primary" onclick="adminReactivate(\''+u.userId+'\')">복구</button>')
          + ' <button class="btn btn-ghost" onclick="adminGrant(\''+u.userId+'\')">30일 부여</button>'
          + '</td></tr>';
      }).join('');
      box.innerHTML = '<table><tr><th>이메일</th><th>이름</th><th>가입</th><th>플랜</th><th>만료</th><th>가입일</th><th>조작</th></tr>' + rows + '</table>';
    });
  }

  function loadPayments() {
    var month = document.getElementById('payments-month').value.replace('-', '');
    var box = document.getElementById('payments-table');
    box.innerHTML = '로딩 중...';
    api('GET', '/admin/payments?month=' + month).then(function(res){
      if (!res.ok || !res.payments.length) return box.innerHTML = '<div class="empty">결제 없음</div>';
      var rows = res.payments.map(function(p){
        return '<tr><td>' + shortDate(p.approvedAt) + '</td>'
          + '<td>' + esc(p.userId.slice(-8)) + '</td>'
          + '<td>' + (p.amount/10000).toFixed(0) + '만원</td>'
          + '<td>' + esc(p.method || '') + ' ' + esc(p.cardCompany || '') + '</td>'
          + '<td>' + esc(p.status) + '</td>'
          + '<td>' + (p.refundAmount ? (p.refundAmount/10000).toFixed(0) + '만원' : '-') + '</td></tr>';
      }).join('');
      box.innerHTML = '<table><tr><th>승인일시</th><th>회원</th><th>금액</th><th>수단</th><th>상태</th><th>환불</th></tr>' + rows + '</table>';
    });
  }

  function loadDevices() {
    var box = document.getElementById('devices-table');
    box.innerHTML = '로딩 중...';
    api('GET', '/admin/device/requests').then(function(res){
      if (!res.ok || !res.requests.length) return box.innerHTML = '<div class="empty">재등록 요청 없음</div>';
      var rows = res.requests.map(function(r){
        var u = r.user || {};
        return '<tr><td>' + esc(u.email || '') + '</td><td>' + esc(u.name || '') + '</td>'
          + '<td>' + esc(r.reason || '') + '</td>'
          + '<td>' + shortDate(r.requestedAt) + '</td>'
          + '<td><button class="btn btn-primary" onclick="adminApproveDevice(\''+r.userId+'\')">승인</button></td></tr>';
      }).join('');
      box.innerHTML = '<table><tr><th>이메일</th><th>이름</th><th>사유</th><th>요청일</th><th>처리</th></tr>' + rows + '</table>';
    });
  }

  function loadRevenue() {
    var month = document.getElementById('revenue-month').value.replace('-', '');
    var box = document.getElementById('revenue-content');
    box.innerHTML = '로딩 중...';
    api('GET', '/admin/revenue?month=' + month).then(function(res){
      if (!res.ok) return box.innerHTML = '<div class="empty">불러오기 실패</div>';
      box.innerHTML 

  // ═══ 주간 추천 포지션 ═══
  const MULT = {
    '크루드 오일':1000,'천연가스':10000,'골드':100,
    'S&P500':50,'s&p500':50,'호주달러':100000,'10년국채':1000,
    '대두':50,'밀':50,'옥수수':50
  };
  const FRAC = {'밀':8,'대두':8,'옥수수':8,'10년국채':64};

  function parsePremium(val, name) {
    var s = String(val).trim();
    var denom = FRAC[name];
    if (denom && s.includes('`')) {
      var p = s.split('`');
      return (parseFloat(p[0])||0) + (parseFloat(p[1])||0)/denom;
    }
    return parseFloat(s)||0;
  }

  function parsePicks(text) {
    return text.split('\n').map(function(line){
      line = line.trim();
      if (!line) return null;
      var parts = line.split(',').map(function(s){return s.trim();});
      if (parts.length < 7) return null;
      var date    = parts[0];
      var name    = parts[1];
      var month   = parts[2];
      var strike  = parts[3].replace('행사가','').trim();
      var optType = parts[4].trim();
      var premium = parts[5].trim();
      var rest    = parts[6].trim(); // "1계약 추천 증거금 942"
      var contracts = parseInt(rest)||1;
      var marginMatch = rest.match(/증거금\s*([\d,]+)/);
      var margin  = marginMatch ? parseFloat(marginMatch[1].replace(',','')) : null;
      var premiumUsd = parsePremium(premium, name) * contracts * (MULT[name]||1000);
      var returnPct = margin ? (premiumUsd / margin * 100).toFixed(1) : null;
      return {date, name, month, strike, optType, premium, contracts, margin, premiumUsd: premiumUsd.toFixed(0), returnPct};
    }).filter(Boolean);
  }

  function renderPicksPreview(picks) {
    if (!picks.length) return '<div class="empty">파싱된 포지션 없음</div>';
    var rows = picks.map(function(p){
      var ret = p.returnPct ? '<b style="color:#16a34a">+'+p.returnPct+'%</b>' : '-';
      var margin = p.margin ? '$'+p.margin.toLocaleString() : '-';
      return '<tr>'
        +'<td>'+p.date+'</td>'
        +'<td><b>'+p.name+'</b></td>'
        +'<td>'+p.month+'</td>'
        +'<td>'+p.strike+'</td>'
        +'<td>'+p.optType+'</td>'
        +'<td>'+p.premium+' ('+p.contracts+'계약)</td>'
        +'<td>'+margin+'</td>'
        +'<td>$'+p.premiumUsd+'</td>'
        +'<td>'+ret+'</td>'
        +'</tr>';
    }).join('');
    return '<table><tr><th>날짜</th><th>종목</th><th>월물</th><th>행사가</th><th>옵션</th><th>프리미엄</th><th>증거금</th><th>수취금</th><th>월간수익률</th></tr>'+rows+'</table>';
  }

  window.saveWeeklyPicks = function() {
    var title = (document.getElementById('picks-title').value||'').trim();
    var text  = (document.getElementById('picks-input').value||'').trim();
    var status = document.getElementById('picks-status');
    if (!text) { status.textContent = '내용을 입력해주세요.'; return; }
    var picks = parsePicks(text);
    if (!picks.length) { status.textContent = '파싱 실패 — 형식을 확인해주세요.'; return; }
    var payload = {weekly_picks: {title: title || picks[0].date+' 추천 포지션', updated: new Date().toISOString().slice(0,10), items: picks, raw: text}};
    api('POST', '/admin/data', payload).then(function(res){
      if (res && res.ok) {
        status.style.color='#16a34a';
        status.textContent = '저장 완료! 깃허브_푸시.bat 실행 후 대시보드에 반영됩니다.';
        document.getElementById('picks-preview').innerHTML = renderPicksPreview(picks);
      } else {
        // 로컬 저장 fallback
        saveToAdminDataJson(payload, picks, status);
      }
    }).catch(function(){
      saveToAdminDataJson(payload, picks, status);
    });
  };

  function saveToAdminDataJson(payload, picks, status) {
    // admin_data.json 로드 → weekly_picks 병합 → 다운로드
    fetch('../admin_data.json?t='+Date.now())
      .then(function(r){ return r.json(); })
      .catch(function(){ return {}; })
      .then(function(existing){
        existing.weekly_picks = payload.weekly_picks;
        var blob = new Blob([JSON.stringify(existing, null, 2)], {type:'application/json'});
        var url  = URL.createObjectURL(blob);
        var a    = document.createElement('a');
        a.href   = url; a.download = 'admin_data.json'; a.click();
        URL.revokeObjectURL(url);
        status.style.color = '#16a34a';
        status.textContent = 'admin_data.json 다운로드 완료! volatility/ 폴더에 덮어쓰고 깃허브_푸시.bat 실행하세요.';
        document.getElementById('picks-preview').innerHTML = renderPicksPreview(picks);
      });
  }

  window.clearWeeklyPicks = function() {
    document.getElementById('picks-input').value = '';
    document.getElementById('picks-title').value = '';
    document.getElementById('picks-status').textContent = '';
    document.getElementById('picks-preview').innerHTML = '';
  };

  // 자동 미리보기
  document.addEventListener('DOMContentLoaded', function(){
    var ta = document.getElementById('picks-input');
    if (ta) ta.addEventListener('input', function(){
